<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Grid background -->
  <rect width="100" height="100" rx="8" fill="#4a90d9"/>
  <!-- 3x3 inner grid lines -->
  <line x1="20" y1="20" x2="80" y2="20" stroke="white" stroke-width="2"/>
  <line x1="20" y1="40" x2="80" y2="40" stroke="white" stroke-width="2"/>
  <line x1="20" y1="60" x2="80" y2="60" stroke="white" stroke-width="2"/>
  <line x1="20" y1="80" x2="80" y2="80" stroke="white" stroke-width="2"/>
  <line x1="20" y1="20" x2="20" y2="80" stroke="white" stroke-width="2"/>
  <line x1="40" y1="20" x2="40" y2="80" stroke="white" stroke-width="2"/>
  <line x1="60" y1="20" x2="60" y2="80" stroke="white" stroke-width="2"/>
  <line x1="80" y1="20" x2="80" y2="80" stroke="white" stroke-width="2"/>
  <!-- Outer border -->
  <rect x="20" y="20" width="60" height="60" rx="2" fill="none" stroke="white" stroke-width="3"/>
  <!-- Sample digits -->
  <text x="30" y="37" text-anchor="middle" font-size="14" font-weight="bold" fill="white">3</text>
  <text x="50" y="57" text-anchor="middle" font-size="14" font-weight="bold" fill="white">+</text>
  <text x="70" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="white">6</text>
</svg>
